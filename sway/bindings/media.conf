bindsym --locked XF86TouchpadToggle exec input type:touchpad events toggle enabled disabled
bindsym --locked XF86TouchpadOn exec input type:touchpad events enabled
bindsym --locked XF86TouchpadOff exec input type:touchpad events enabled

# Precise 1% multimedia adjustments with Alt modifier
bindsym --locked Alt+XF86AudioRaiseVolume exec pactl set-sink-volume @DEFAULT_SINK@ +1%
bindsym --locked Alt+XF86AudioLowerVolume exec pactl set-sink-volume @DEFAULT_SINK@ -1%
bindsym --locked Alt+XF86MonBrightnessUp exec brightnessctl set 1%+
bindsym --locked Alt+XF86MonBrightnessDown exec brightnessctl set 1%-

