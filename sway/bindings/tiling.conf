# Close focused window
bindsym Super+Shift+q kill
bindsym Ctrl+Alt+Delete [workspace="__focused__"] kill

# Control tiling
bindsym Super+b splith
bindsym Super+v splitv

bindsym Super+s layout stacking
bindsym Super+w layout tabbed
bindsym Super+j layout toggle split

bindsym Super+f fullscreen
bindsym Super+t floating toggle
bindsym Super+Alt+f focus mode_toggle
bindsym Super+a focus parent

# Move focus with SUPER + arrow keys
bindsym Super+Left focus left
bindsym Super+Down focus down
bindsym Super+Up focus up
bindsym Super+Right focus right

# Move focused window with the same, but add Shift
bindsym Super+Shift+Left move left
bindsym Super+Shift+Down move down
bindsym Super+Shift+Up move up
bindsym Super+Shift+Right move right

# Switch workspaces with SUPER + [1-9; 0]
bindsym Super+1 workspace number 1
bindsym Super+2 workspace number 2
bindsym Super+3 workspace number 3
bindsym Super+4 workspace number 4
bindsym Super+5 workspace number 5
bindsym Super+6 workspace number 6
bindsym Super+7 workspace number 7
bindsym Super+8 workspace number 8
bindsym Super+9 workspace number 9
bindsym Super+0 workspace number 10

# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
bindsym Super+Shift+1 move container to workspace number 1, workspace number 1
bindsym Super+Shift+2 move container to workspace number 2, workspace number 2
bindsym Super+Shift+3 move container to workspace number 3, workspace number 3
bindsym Super+Shift+4 move container to workspace number 4, workspace number 4
bindsym Super+Shift+5 move container to workspace number 5, workspace number 5
bindsym Super+Shift+6 move container to workspace number 6, workspace number 6
bindsym Super+Shift+7 move container to workspace number 7, workspace number 7
bindsym Super+Shift+8 move container to workspace number 8, workspace number 8
bindsym Super+Shift+9 move container to workspace number 9, workspace number 9
bindsym Super+Shift+0 move container to workspace number 10, workspace number 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
bindsym Super+Shift+Alt+1 move container to workspace number 1
bindsym Super+Shift+Alt+2 move container to workspace number 2
bindsym Super+Shift+Alt+3 move container to workspace number 3
bindsym Super+Shift+Alt+4 move container to workspace number 4
bindsym Super+Shift+Alt+5 move container to workspace number 5
bindsym Super+Shift+Alt+6 move container to workspace number 6
bindsym Super+Shift+Alt+7 move container to workspace number 7
bindsym Super+Shift+Alt+8 move container to workspace number 8
bindsym Super+Shift+Alt+9 move container to workspace number 9
bindsym Super+Shift+Alt+0 move container to workspace number 10

# Control scratchpad
bindsym Super+Shift+minus move scratchpad
bindsym Super+minus scratchpad show

# TAB between workspaces
bindsym Super+Tab workspace next
bindsym Super+Shift+Tab workspace prev

# Move workspaces to other monitors
bindsym Super+Shift+Alt+Left move workspace to output left
bindsym Super+Shift+Alt+Right move workspace to output right
bindsym Super+Shift+Alt+Up move workspace to output up
bindsym Super+Shift+Alt+Down move workspace to output down

# Cycle through applications on active workspace
bindsym Alt+Tab focus next
bindsym Alt+Shift+Tab focus prev

# Resize active window
mode "resize" {
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px

    # Return to default mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym Super+r mode "resize"
floating_modifier Super normal

# Scroll through existing workspaces with SUPER + scroll
bindsym --whole-window Super+button4 workspace prev
bindsym --whole-window Super+button5 workspace next
